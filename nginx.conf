events {}
http {
  map $http_upgrade $conn_up { default upgrade; '' close; }
  server {
    listen 8080;

    location = /__shim.js {
      alias /opt/shim.js;
      default_type application/javascript;
    }

    location / {
      proxy_pass http://127.0.0.1:4318;
      proxy_set_header Host $host;
      proxy_set_header Accept-Encoding "";          # necessário pro sub_filter rewrite
      proxy_hide_header Content-Security-Policy;     # evita CSP bloquear o fetch reescrito
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $conn_up;
      proxy_buffering off;                           # pro "connects automatically" (SSE/stream)

      sub_filter_once on;
      sub_filter_types text/html;
      sub_filter '<head>' '<head><script src="/__shim.js"></script>';
    }
  }
}
