events {}
http {
  map $http_upgrade $conn_up { default upgrade; '' close; }
  server {
    listen 8080;

    location = /__shim.js {
      alias /opt/shim.js;
      default_type application/javascript;
    }

    location / {
      proxy_pass http://127.0.0.1:4318;
      proxy_set_header Host $host;
      proxy_set_header Accept-Encoding "";
      proxy_hide_header Content-Security-Policy;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $conn_up;
      proxy_buffering off;

      sub_filter_once on;
      sub_filter_types text/html;
      sub_filter '<head>' '<head><script>!function(){var B=/^(https?|wss?):\/\/127\.0\.0\.1(:\d+)?/i;function f(u){try{if(typeof u==="string"&&B.test(u)){var p=u.replace(B,"");if(/^wss?:/i.test(u))return(location.protocol==="https:"?"wss://":"ws://")+location.host+p;return location.origin+p}}catch(e){}return u}var of=window.fetch;if(of)window.fetch=function(i,n){if(typeof i==="string")i=f(i);else if(i&&i.url)i=new Request(f(i.url),i);return of.call(this,i,n)};var oo=XMLHttpRequest.prototype.open;XMLHttpRequest.prototype.open=function(m,u){arguments[1]=f(u);return oo.apply(this,arguments)};var OW=window.WebSocket;if(OW){window.WebSocket=function(u,p){return p===undefined?new OW(f(u)):new OW(f(u),p)};window.WebSocket.prototype=OW.prototype}}();</script>';
    }
  }
}
